<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a3e"/>
      <stop offset="100%" stop-color="#030014"/>
    </radialGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8956c"/>
      <stop offset="100%" stop-color="#a0704a"/>
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="faceLight" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#d4a07a"/>
      <stop offset="100%" stop-color="#9a6442"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- Glow rings -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="url(#glowGrad)" stroke-width="1" opacity="0.4"/>
  <circle cx="200" cy="200" r="130" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.2"/>

  <!-- Ambient glow behind figure -->
  <ellipse cx="200" cy="240" rx="90" ry="70" fill="#8b5cf6" filter="url(#blur)" opacity="0.15"/>

  <!-- Shirt / body -->
  <ellipse cx="200" cy="360" rx="100" ry="80" fill="url(#shirtGrad)"/>
  <ellipse cx="200" cy="310" rx="72" ry="55" fill="url(#shirtGrad)"/>

  <!-- Neck -->
  <rect x="183" y="242" width="34" height="36" rx="8" fill="url(#skinGrad)"/>

  <!-- Collar detail -->
  <path d="M183 268 L160 300 L200 290 L240 300 L217 268" fill="#7c3aed" opacity="0.8"/>

  <!-- Head -->
  <ellipse cx="200" cy="200" rx="68" ry="72" fill="url(#faceLight)"/>

  <!-- Ears -->
  <ellipse cx="132" cy="205" rx="12" ry="18" fill="#b07850"/>
  <ellipse cx="268" cy="205" rx="12" ry="18" fill="#b07850"/>
  <ellipse cx="132" cy="205" rx="7" ry="12" fill="#9a6442"/>
  <ellipse cx="268" cy="205" rx="7" ry="12" fill="#9a6442"/>

  <!-- Hair - dark wavy -->
  <ellipse cx="200" cy="152" rx="70" ry="40" fill="#1a0a0a"/>
  <path d="M130 185 Q128 155 140 138 Q160 118 200 115 Q240 118 260 138 Q272 155 270 185" fill="#1a0a0a"/>
  <!-- Hair highlights -->
  <path d="M148 140 Q160 128 180 125" stroke="#3d2020" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M165 122 Q180 116 200 115" stroke="#3d2020" stroke-width="2.5" fill="none" opacity="0.5"/>

  <!-- Eyebrows -->
  <path d="M163 186 Q175 180 188 182" stroke="#1a0a0a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M212 182 Q225 180 237 186" stroke="#1a0a0a" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes - whites -->
  <ellipse cx="176" cy="200" rx="15" ry="11" fill="white"/>
  <ellipse cx="224" cy="200" rx="15" ry="11" fill="white"/>
  <!-- Iris -->
  <circle cx="178" cy="201" r="9" fill="#3d2010"/>
  <circle cx="226" cy="201" r="9" fill="#3d2010"/>
  <!-- Pupil -->
  <circle cx="179" cy="201" r="5.5" fill="#0a0510"/>
  <circle cx="227" cy="201" r="5.5" fill="#0a0510"/>
  <!-- Eye highlight -->
  <circle cx="182" cy="198" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="230" cy="198" r="2.5" fill="white" opacity="0.9"/>

  <!-- Nose -->
  <path d="M197 206 Q194 218 190 223 Q197 227 204 226 Q210 227 210 223 Q206 218 203 206" fill="#9a6040" opacity="0.6"/>

  <!-- Smile -->
  <path d="M182 238 Q200 252 218 238" stroke="#7a4830" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Tech badge -->
  <rect x="156" y="325" width="88" height="28" rx="14" fill="rgba(139,92,246,0.25)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="200" y="344" text-anchor="middle" font-family="'Fira Code', monospace" font-size="11" fill="#a78bfa" font-weight="500">FullStack Dev</text>
</svg>
